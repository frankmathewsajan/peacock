<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1.0,user-scalable=no,viewport-fit=cover" />
    <title>Peacock Engine</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/localforage/1.10.0/localforage.min.js"></script>
    <style>
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        .pb-safe { padding-bottom: max(0.75rem, env(safe-area-inset-bottom)); }
        .pt-safe { padding-top: max(0.75rem, env(safe-area-inset-top)); }
    </style>
</head>

<body class="h-[100dvh] w-full bg-slate-50 text-slate-900 overflow-hidden flex flex-col font-sans">

    <header class="p-4 bg-white border-b border-slate-200 shrink-0 z-10 pt-safe">
        <div class="flex justify-between items-center mb-1.5">
            <span class="text-[11px] font-semibold text-slate-400 uppercase tracking-wider">API Token Usage</span>
            <div class="flex items-center gap-2">
                <span id="token-text" class="text-[11px] font-semibold text-slate-500 uppercase tracking-wider select-none transition-all">0 / 1,000,000</span>
                <button id="refresh-btn" class="text-slate-400 hover:text-slate-600 active:scale-90 transition p-1 rounded-md cursor-pointer touch-none">
                    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
                </button>
            </div>
        </div>
        <div class="h-1 w-full bg-slate-100 rounded-full overflow-hidden">
            <div id="token-fill" class="h-full bg-slate-900 transition-all duration-500 ease-out w-0"></div>
        </div>
    </header>

    <main id="feed" class="flex-1 overflow-y-auto p-4 space-y-3 scroll-smooth bg-slate-50 w-full">
        </main>

    <footer class="bg-white border-t border-slate-200 p-3 pt-4 shrink-0 shadow-[0_-8px_24px_-6px_rgba(0,0,0,0.04)] z-10 pb-safe w-full">
        
        <div id="draft-gallery" class="flex gap-2 overflow-x-auto pb-3 hidden scrollbar-hide w-full"></div>

        <div class="flex flex-col gap-3 mb-3 w-full">
            
            <div class="flex justify-between items-center gap-2">
                
                <div class="flex bg-slate-100 p-1 rounded-lg border border-slate-200 shrink-0">
                    <button id="model-fast" onclick="setModel('fast')" class="px-3 py-1 text-[11px] font-bold uppercase tracking-wider rounded-md bg-white shadow-sm text-slate-800 transition">Fast</button>
                    <button id="model-deep" onclick="setModel('deep')" class="px-3 py-1 text-[11px] font-bold uppercase tracking-wider rounded-md text-slate-400 transition hover:text-slate-600">Deep</button>
                </div>

                <div class="flex bg-slate-100 p-1 rounded-lg border border-slate-200 shrink-0">
                    <button id="mode-manual" onclick="setMode('manual')" class="px-3 py-1 text-[11px] font-bold uppercase tracking-wider rounded-md bg-white shadow-sm text-slate-800 transition">Manual</button>
                    <button id="mode-auto" onclick="setMode('auto')" class="px-3 py-1 text-[11px] font-bold uppercase tracking-wider rounded-md text-slate-400 transition hover:text-slate-600">Auto</button>
                </div>
            </div>

            <div class="flex items-center gap-2 w-full">
                <div id="prompts-container" class="flex-1 flex gap-2 overflow-x-auto scrollbar-hide min-w-0"></div>
                <button onclick="openConfigModal()" class="shrink-0 w-8 h-8 flex items-center justify-center bg-slate-100 text-slate-500 hover:text-slate-800 rounded-lg transition active:scale-95 border border-slate-200">
                    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
                </button>
            </div>
        </div>

        <div class="flex gap-2 w-full items-center">
            <button id="capture" class="shrink-0 h-12 px-4 rounded-xl bg-slate-100 border border-slate-200 text-slate-700 text-sm font-semibold active:scale-[0.96] transition flex items-center justify-center gap-2 shadow-sm">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/><circle cx="12" cy="13" r="3"/></svg>
                Capture
            </button>
            <form id="form" class="flex-1 flex gap-2 min-w-0">
                <input id="input" autocomplete="off" class="flex-1 min-w-0 h-12 px-3.5 rounded-xl border border-slate-200 bg-slate-50 text-sm outline-none focus:ring-1 focus:ring-slate-400 focus:bg-white transition" placeholder="Query context..." />
                <button id="send-btn" type="submit" class="shrink-0 h-12 w-12 flex items-center justify-center rounded-xl bg-slate-900 text-white active:scale-[0.96] transition shadow-md">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
                </button>
            </form>
        </div>
    </footer>

    <div id="config-modal" class="fixed inset-0 bg-slate-900/40 z-50 flex items-center justify-center p-4 opacity-0 pointer-events-none transition-opacity duration-200">
        <div class="bg-white rounded-2xl w-full max-w-sm p-5 shadow-2xl transform scale-95 transition-transform duration-200">
            <h3 class="font-bold text-slate-800 mb-4">Engine Configuration</h3>
            
            <div class="mb-4">
                <label class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-2 block">Auto-Fire Prompt</label>
                <input id="auto-prompt" class="w-full border border-indigo-200 bg-indigo-50 rounded-lg p-2.5 text-sm outline-none focus:border-indigo-400" placeholder="Default execute command...">
            </div>

            <div class="space-y-3 mb-5">
                <label class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-2 block">Manual Presets</label>
                <input id="p1" class="w-full border border-slate-200 rounded-lg p-2.5 text-sm outline-none focus:border-slate-400" placeholder="Preset 1">
                <input id="p2" class="w-full border border-slate-200 rounded-lg p-2.5 text-sm outline-none focus:border-slate-400" placeholder="Preset 2">
                <input id="p3" class="w-full border border-slate-200 rounded-lg p-2.5 text-sm outline-none focus:border-slate-400" placeholder="Preset 3">
            </div>

            <div class="flex gap-2 justify-end">
                <button onclick="closeConfigModal()" class="px-4 py-2 bg-slate-100 text-slate-700 font-semibold rounded-lg text-sm transition hover:bg-slate-200">Cancel</button>
                <button onclick="saveConfig()" class="px-4 py-2 bg-slate-900 text-white font-semibold rounded-lg text-sm transition hover:bg-slate-800">Save</button>
            </div>
        </div>
    </div>

    <div id="modal" class="fixed inset-0 bg-white z-50 flex flex-col transform translate-y-full transition-transform duration-300 ease-in-out">
        <div class="flex justify-between items-center p-4 border-b border-slate-200 bg-slate-50 shrink-0 pt-safe">
            <h2 class="font-semibold text-sm text-slate-700 uppercase tracking-wider">Analysis Output</h2>
            <button onclick="closeModal()" class="h-9 px-4 bg-slate-200 hover:bg-slate-300 text-slate-800 rounded-lg font-bold text-xs transition active:scale-95">
                Close
            </button>
        </div>
        <div class="flex-1 overflow-y-auto p-5 bg-white pb-safe">
            <article id="modal-content" class="prose prose-slate prose-sm max-w-none prose-headings:font-semibold prose-pre:bg-slate-900 text-slate-800 leading-relaxed"></article>
        </div>
    </div>

<script>
    const store = localforage.createInstance({ name: 'stealth_history_db' });
    const ws = new WebSocket(`ws://${location.host}/stream`);
    ws.binaryType = "blob";

    const input = document.getElementById("input");
    const sendBtn = document.getElementById("send-btn");
    const draftGallery = document.getElementById("draft-gallery");
    const feed = document.getElementById("feed");
    const modal = document.getElementById("modal");
    
    const MAX_TOKENS = 1000000;
    let temporaryBlobs = [];
    let transactionHistory = [];
    
    // State variables
    let tokenFormat = 'raw';
    let currentModel = 'fast';
    let currentMode = 'manual';
    let awaitingAutoFire = false;

    // Load Configurations
    let customPrompts = JSON.parse(localStorage.getItem('saved_prompts')) || ["Summarize context", "Extract exact text", "Explain concept"];
    let autoFirePrompt = localStorage.getItem('auto_prompt') || "Analyze this screen and provide key takeaways.";

    async function init() {
        transactionHistory = await store.getItem('history_stack') || [];
        renderPrompts();
        updateTokenTelemetry();
        renderHistoryFeed();
        setupTokenLongPress();
    }

    // --- State Toggles ---
    function setModel(target) {
        currentModel = target;
        document.getElementById('model-fast').className = target === 'fast' ? "px-3 py-1 text-[11px] font-bold uppercase tracking-wider rounded-md bg-white shadow-sm text-slate-800 transition" : "px-3 py-1 text-[11px] font-bold uppercase tracking-wider rounded-md text-slate-400 transition hover:text-slate-600";
        document.getElementById('model-deep').className = target === 'deep' ? "px-3 py-1 text-[11px] font-bold uppercase tracking-wider rounded-md bg-white shadow-sm text-slate-800 transition" : "px-3 py-1 text-[11px] font-bold uppercase tracking-wider rounded-md text-slate-400 transition hover:text-slate-600";
    }

    function setMode(target) {
        currentMode = target;
        document.getElementById('mode-manual').className = target === 'manual' ? "px-3 py-1 text-[11px] font-bold uppercase tracking-wider rounded-md bg-white shadow-sm text-slate-800 transition" : "px-3 py-1 text-[11px] font-bold uppercase tracking-wider rounded-md text-slate-400 transition hover:text-slate-600";
        document.getElementById('mode-auto').className = target === 'auto' ? "px-3 py-1 text-[11px] font-bold uppercase tracking-wider rounded-md bg-white shadow-sm text-slate-800 transition" : "px-3 py-1 text-[11px] font-bold uppercase tracking-wider rounded-md text-slate-400 transition hover:text-slate-600";
    }

    // --- Telemetry ---
    function updateTokenTelemetry() {
        const used = parseInt(localStorage.getItem('token_tracker') || '0', 10);
        const ratio = Math.min((used / MAX_TOKENS) * 100, 100);
        document.getElementById('token-fill').style.width = `${ratio}%`;
        document.getElementById('token-text').innerText = tokenFormat === 'percent' ? `${ratio.toFixed(2)}% USED` : `${used.toLocaleString()} / ${MAX_TOKENS.toLocaleString()}`;
    }

    function setupTokenLongPress() {
        const btn = document.getElementById('refresh-btn');
        let pressTimer;
        const startPress = () => {
            pressTimer = setTimeout(() => {
                tokenFormat = tokenFormat === 'raw' ? 'percent' : 'raw';
                updateTokenTelemetry();
                btn.classList.add('text-indigo-500');
                setTimeout(() => btn.classList.remove('text-indigo-500'), 300);
            }, 600);
        };
        const cancelPress = () => clearTimeout(pressTimer);
        btn.addEventListener('pointerdown', startPress);
        btn.addEventListener('pointerup', cancelPress);
        btn.addEventListener('pointerleave', cancelPress);
        btn.addEventListener('click', () => updateTokenTelemetry());
    }

    // --- Configurations ---
    function renderPrompts() {
        const container = document.getElementById('prompts-container');
        container.innerHTML = '';
        customPrompts.forEach(p => {
            if (!p.trim()) return;
            const btn = document.createElement('button');
            btn.className = "px-3 py-2 rounded-xl border border-slate-200 bg-white font-medium text-[11px] text-slate-600 whitespace-nowrap active:bg-slate-100 shadow-sm transition";
            btn.innerText = p;
            btn.onclick = () => { input.value = p; };
            container.appendChild(btn);
        });
    }

    function openConfigModal() {
        document.getElementById('auto-prompt').value = autoFirePrompt;
        document.getElementById('p1').value = customPrompts[0] || "";
        document.getElementById('p2').value = customPrompts[1] || "";
        document.getElementById('p3').value = customPrompts[2] || "";
        
        const modal = document.getElementById('config-modal');
        modal.classList.remove('opacity-0', 'pointer-events-none');
        modal.children[0].classList.remove('scale-95');
    }

    function closeConfigModal() {
        const modal = document.getElementById('config-modal');
        modal.classList.add('opacity-0', 'pointer-events-none');
        modal.children[0].classList.add('scale-95');
    }

    function saveConfig() {
        autoFirePrompt = document.getElementById('auto-prompt').value.trim() || "Analyze this screen.";
        localStorage.setItem('auto_prompt', autoFirePrompt);

        customPrompts = [
            document.getElementById('p1').value.trim(),
            document.getElementById('p2').value.trim(),
            document.getElementById('p3').value.trim()
        ];
        localStorage.setItem('saved_prompts', JSON.stringify(customPrompts));
        
        renderPrompts();
        closeConfigModal();
    }

    // --- Capture & Auto-Fire Logic ---
    ws.onmessage = (e) => {
        temporaryBlobs.push(e.data);
        renderDraftPreviewRow();

        if (awaitingAutoFire) {
            awaitingAutoFire = false;
            // Force Fast model on auto-fire to conserve tokens and reduce latency
            executeInference(autoFirePrompt, 'fast');
        }
    };

    document.getElementById("capture").onclick = () => {
        if (ws.readyState === 1) {
            if (currentMode === 'auto') {
                awaitingAutoFire = true;
            }
            ws.send("CAPTURE");
        }
    };

    function renderDraftPreviewRow() {
        draftGallery.innerHTML = '';
        if (temporaryBlobs.length === 0) {
            draftGallery.classList.add('hidden');
            return;
        }
        draftGallery.classList.remove('hidden');
        temporaryBlobs.forEach(blob => {
            const url = URL.createObjectURL(blob);
            const wrapper = document.createElement('div');
            wrapper.className = "relative h-14 w-20 shrink-0 border border-slate-200 rounded-lg overflow-hidden bg-slate-100";
            const img = document.createElement('img');
            img.src = url;
            img.className = "h-full w-full object-cover";
            wrapper.appendChild(img);
            draftGallery.appendChild(wrapper);
        });
    }

    // --- History Feed ---
    function renderHistoryFeed() {
        feed.innerHTML = '';
        if (transactionHistory.length === 0) {
            feed.innerHTML = `<div class="h-full flex items-center justify-center text-xs text-slate-400 font-medium">No active contexts.</div>`;
            return;
        }

        transactionHistory.forEach(record => {
            const card = document.createElement('div');
            card.className = "bg-white border border-slate-200 rounded-xl p-3.5 shadow-sm flex flex-col gap-3 relative";
            
            const deleteBtn = document.createElement('button');
            deleteBtn.className = "absolute top-3 right-3 text-slate-300 hover:text-red-500 transition p-1 rounded-md";
            deleteBtn.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg>`;
            deleteBtn.onclick = () => deleteRecord(record.id);
            card.appendChild(deleteBtn);

            const metaRow = document.createElement('div');
            metaRow.className = "flex gap-2 items-center pr-8";
            
            const badge = document.createElement('span');
            badge.className = record.model === 'deep' ? "px-1.5 py-0.5 rounded text-[9px] font-bold bg-indigo-50 text-indigo-600 border border-indigo-100 uppercase" : "px-1.5 py-0.5 rounded text-[9px] font-bold bg-slate-100 text-slate-500 border border-slate-200 uppercase";
            badge.innerText = record.model;
            metaRow.appendChild(badge);

            const promptTitle = document.createElement('div');
            promptTitle.className = "text-sm font-medium text-slate-800 break-words line-clamp-2";
            promptTitle.innerText = record.prompt || "Visual analysis";
            metaRow.appendChild(promptTitle);
            
            card.appendChild(metaRow);

            if (record.images && record.images.length > 0) {
                const scrollContainer = document.createElement('div');
                scrollContainer.className = "flex gap-1.5 overflow-x-auto pb-0.5 scrollbar-hide";
                record.images.forEach(imgBlob => {
                    const url = URL.createObjectURL(imgBlob);
                    const thumbnail = document.createElement('img');
                    thumbnail.src = url;
                    thumbnail.className = "h-11 w-16 object-cover rounded border border-slate-100 bg-slate-50 shrink-0";
                    scrollContainer.appendChild(thumbnail);
                });
                card.appendChild(scrollContainer);
            }

            const actionBtn = document.createElement('button');
            actionBtn.className = "w-full py-2.5 bg-slate-50 hover:bg-slate-100 border border-slate-200 text-slate-800 font-semibold rounded-lg text-xs transition active:scale-[0.98]";
            actionBtn.innerText = "Review Response";
            actionBtn.onclick = () => showModalContent(record.id);
            card.appendChild(actionBtn);

            feed.appendChild(card);
        });
    }

    async function deleteRecord(id) {
        transactionHistory = transactionHistory.filter(item => item.id !== id);
        await store.setItem('history_stack', transactionHistory);
        renderHistoryFeed();
    }

    function showSkeleton() {
        const skel = document.createElement('div');
        skel.id = "skeleton-loader";
        skel.className = "bg-white border border-slate-200 rounded-xl p-3.5 shadow-sm flex flex-col gap-3 animate-pulse";
        skel.innerHTML = `
            <div class="flex gap-2 items-center"><div class="h-4 w-8 bg-slate-200 rounded"></div><div class="h-4 bg-slate-200 rounded w-1/2"></div></div>
            <div class="flex gap-1.5"><div class="h-11 w-16 bg-slate-200 rounded"></div></div>
            <div class="h-8 bg-slate-100 rounded w-full"></div>
        `;
        feed.prepend(skel);
    }

    function removeSkeleton() {
        const skel = document.getElementById('skeleton-loader');
        if (skel) skel.remove();
    }

    // --- Execution ---
    document.getElementById("form").onsubmit = (e) => {
        e.preventDefault();
        executeInference(input.value.trim(), currentModel);
    };

    async function executeInference(queryText, executionModel) {
        if (!queryText && temporaryBlobs.length === 0) return;

        input.disabled = true;
        sendBtn.disabled = true;
        
        const originalBtnHTML = sendBtn.innerHTML;
        sendBtn.innerHTML = `<span class="animate-pulse">...</span>`;
        
        showSkeleton();
        feed.scrollTo({ top: 0, behavior: 'smooth' });

        try {
            const res = await fetch("/chat", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ 
                    message: queryText,
                    model_tier: executionModel
                })
            });
            
            const data = await res.json();
            
            let totalSpent = parseInt(localStorage.getItem('token_tracker') || '0', 10);
            localStorage.setItem('token_tracker', totalSpent + data.tokens);
            updateTokenTelemetry();

            const contextRecord = {
                id: Date.now(),
                prompt: queryText,
                model: executionModel,
                images: [...temporaryBlobs],
                response: data.response
            };
            
            transactionHistory.unshift(contextRecord);
            await store.setItem('history_stack', transactionHistory);
            
            temporaryBlobs = [];
            renderDraftPreviewRow();
            
        } catch (error) {
            console.error("Network fault:", error);
            alert("Backend communication failed.");
        } finally {
            removeSkeleton();
            renderHistoryFeed();
            
            input.disabled = false;
            sendBtn.disabled = false;
            sendBtn.innerHTML = originalBtnHTML;
            input.value = "";
        }
    }

    function showModalContent(id) {
        const target = transactionHistory.find(item => item.id === id);
        if (target) {
            document.getElementById('modal-content').innerHTML = marked.parse(target.response);
            modal.classList.remove('translate-y-full');
        }
    }

    function closeModal() {
        modal.classList.add('translate-y-full');
    }

    init();
</script>
</body>
</html>
